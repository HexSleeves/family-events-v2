name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  E2E_ADMIN_EMAIL: admin@familyevents.local

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      verify: ${{ steps.filter.outputs.verify }}
      ios: ${{ steps.filter.outputs.ios }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed areas
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            {
              echo "web=true"
              echo "verify=true"
              echo "ios=true"
              echo "android=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          files="$(git diff --name-only "$base...$head")"

          matches() {
            local pattern
            for pattern in "$@"; do
              if printf '%s\n' "$files" | grep -Eq "$pattern"; then
                return 0
              fi
            done
            return 1
          }

          web=false
          verify=false
          ios=false
          android=false

          if matches '^(apps/web|packages|supabase|scripts)/' '^(\.github/workflows/ci\.yml|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|turbo\.json)$'; then
            web=true
            verify=true
          fi

          if matches '^apps/ios/' '^\.github/workflows/ci\.yml$'; then
            ios=true
          fi

          if matches '^apps/android/' '^\.github/workflows/ci\.yml$'; then
            android=true
          fi

          {
            echo "web=$web"
            echo "verify=$verify"
            echo "ios=$ios"
            echo "android=$android"
          } >> "$GITHUB_OUTPUT"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  web-check:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@ab5d408e9d066b8ffe7503f789d50fd7e35c0c92 # v6.0.7
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Web check
        run: pnpm --filter @family-events/web check

  # E2E (needs local Supabase — can't run on RWX)
  verify:
    needs:
      - changes
      - web-check
    if: always() && needs.changes.outputs.verify == 'true' && needs.web-check.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@ab5d408e9d066b8ffe7503f789d50fd7e35c0c92 # v6.0.7
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm --filter @family-events/web exec playwright install --with-deps

      # ─── E2E preflight ────────────────────────────────────────────────
      # Boot a local Supabase stack and seed an admin user. The E2E suite
      # needs a working sign-in flow + a row in user_profiles with role
      # admin and matching enabled access. We exclude services the suite
      # doesn't touch (storage, imgproxy, realtime, vector, studio, mailpit,
      # edge-runtime) to cut Docker boot time on cold runners.
      # ──────────────────────────────────────────────────────────────────
      - name: Start local Supabase
        run: |
          bash scripts/supabase.sh start \
            --exclude storage-api,imgproxy,realtime,vector,edge-runtime,studio,mailpit

      - name: Read Supabase env
        id: supabase
        run: |
          STATUS=$(bash scripts/supabase.sh status --output env)
          api_url=$(echo "$STATUS" | grep '^API_URL='          | cut -d'"' -f2)
          anon_key=$(echo "$STATUS" | grep '^PUBLISHABLE_KEY=' | cut -d'"' -f2)
          service_role=$(echo "$STATUS" | grep '^SERVICE_ROLE_KEY=' | cut -d'"' -f2)
          db_url=$(echo "$STATUS" | grep '^DB_URL='            | cut -d'"' -f2)
          echo "::add-mask::$anon_key"
          echo "::add-mask::$service_role"
          {
            echo "api_url=$api_url"
            echo "anon_key=$anon_key"
            echo "service_role=$service_role"
            echo "db_url=$db_url"
          } >> "$GITHUB_OUTPUT"

      - name: Seed admin auth user
        id: seed_admin
        env:
          API_URL: ${{ steps.supabase.outputs.api_url }}
          DB_URL: ${{ steps.supabase.outputs.db_url }}
          SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role }}
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
        run: |
          ADMIN_PASSWORD="$(openssl rand -base64 24 | tr -d "=+/" | cut -c1-24)!Aa1"
          payload=$(printf '{"email":"%s","password":"%s","email_confirm":true}' \
            "$ADMIN_EMAIL" "$ADMIN_PASSWORD")
          code=$(curl -sS -o /tmp/seed_admin.json -w "%{http_code}" \
            -X POST "$API_URL/auth/v1/admin/users" \
            -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "apikey: $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")
          case "$code" in
            200|201) echo "admin auth user created" ;;
            422)
              echo "admin auth user already exists; resetting password to current run value"
              existing_user_id=$(jq -r '.id // empty' /tmp/seed_admin.json)
              if [ -z "$existing_user_id" ]; then
                escaped_admin_email=$(printf "%s" "$ADMIN_EMAIL" | sed "s/'/''/g")
                existing_user_id=$(psql "$DB_URL" -t -A -v ON_ERROR_STOP=1 \
                  -c "SELECT id FROM auth.users WHERE lower(email) = lower('$escaped_admin_email') LIMIT 1;")
                existing_user_id=$(printf '%s' "$existing_user_id" | tr -d '[:space:]')
                if [ -z "$existing_user_id" ]; then
                  echo "::error::could not extract existing admin user id from create response or auth.users"
                  cat /tmp/seed_admin.json
                  exit 1
                fi
              fi
              reset_payload=$(printf '{"password":"%s"}' "$ADMIN_PASSWORD")
              reset_code=$(curl -sS -o /tmp/seed_admin_reset.json -w "%{http_code}" \
                -X PUT "$API_URL/auth/v1/admin/users/$existing_user_id" \
                -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
                -H "apikey: $SERVICE_ROLE_KEY" \
                -H "Content-Type: application/json" \
                -d "$reset_payload")
              if [ "$reset_code" != "200" ]; then
                echo "::error::password reset failed with HTTP $reset_code"
                cat /tmp/seed_admin_reset.json
                exit 1
              fi
              echo "admin password reset completed"
              ;;
            *)
              echo "::error::auth admin create returned HTTP $code"
              cat /tmp/seed_admin.json
              exit 1
              ;;
          esac
          echo "admin_password=$ADMIN_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Promote admin via setup-local
        run: bash scripts/setup-local.sh

      - name: Verify admin is enabled
        env:
          DB_URL: ${{ steps.supabase.outputs.db_url }}
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
        run: |
          result=$(psql "$DB_URL" -t -A -F '|' -v ON_ERROR_STOP=1 \
            -v admin_email="$ADMIN_EMAIL" <<'SQL' | tr -d '[:space:]'
            SELECT up.role, COALESCE(ua.is_enabled::text, 'false')
            FROM public.user_profiles up
            LEFT JOIN public.user_access ua ON ua.user_id = up.id
            WHERE up.email = :'admin_email';
          SQL
          )
          if [ "$result" != "admin|true" ]; then
            echo "::error::admin not provisioned: got '$result', want 'admin|true'"
            exit 1
          fi
          echo "admin verified: role=admin, is_enabled=true"

      - name: E2E
        env:
          VITE_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          VITE_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          PLAYWRIGHT_ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ steps.seed_admin.outputs.admin_password }}
        run: pnpm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/output/playwright/
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: bash scripts/supabase.sh stop || true

  # iOS simulator tests (needs macOS — can't run on RWX)
  ios:
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode_26.4.1.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode_26.5.0.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/family-events-swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('apps/ios/project.yml', 'apps/ios/Packages/**/Package.swift', 'apps/ios/Packages/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Generate iOS project
        run: cd apps/ios && xcodegen generate

      - name: Run iOS tests
        run: |
          cd apps/ios
          mkdir -p "$HOME/Library/Caches/family-events-swiftpm"
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '
            /iPhone 17 \(/ { print $2; found = 1; exit }
            /iPhone/ && !fallback { fallback = $2 }
            END { if (!found && fallback) print fallback }
          ')"
          if [ -z "$SIMULATOR_ID" ]; then
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator $SIMULATOR_ID"
          xcodebuild \
            -project FamilyEvents.xcodeproj \
            -scheme FamilyEvents \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/family-events-swiftpm" \
            -skip-testing:FEDesignSystemTests/EventCardSnapshotTests \
            test

  android:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Android checks
        run: cd apps/android && scripts/with-android-env.sh ./gradlew --build-cache check assembleDebug
