name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  E2E_ADMIN_EMAIL: admin@familyevents.local
  E2E_ADMIN_PASSWORD: Admin123!

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

      - name: Setup pnpm
        uses: pnpm/action-setup@ab5d408e9d066b8ffe7503f789d50fd7e35c0c92 # v6.0.7
        with:
          version: 11.0.9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docs guards
        run: pnpm run docs:test

      - name: Workspace guards
        run: pnpm run workspace:test

      - name: Install Playwright browsers
        run: pnpm --filter @family-events/web exec playwright install --with-deps

      - name: Check
        run: pnpm run check

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      # ─── E2E preflight ────────────────────────────────────────────────
      # Boot a local Supabase stack and seed an admin user. The E2E suite
      # needs a working sign-in flow + a row in user_profiles with role
      # admin and matching enabled access. We exclude services the suite
      # doesn't touch (storage, imgproxy, realtime, vector, studio, mailpit,
      # edge-runtime) to cut Docker boot time on cold runners.
      # ──────────────────────────────────────────────────────────────────
      - name: Start local Supabase
        run: |
          bash scripts/supabase.sh start \
            --exclude storage-api,imgproxy,realtime,vector,edge-runtime,studio,mailpit

      - name: Read Supabase env
        id: supabase
        run: |
          STATUS=$(bash scripts/supabase.sh status --output env)
          api_url=$(echo "$STATUS" | grep '^API_URL='          | cut -d'"' -f2)
          anon_key=$(echo "$STATUS" | grep '^PUBLISHABLE_KEY=' | cut -d'"' -f2)
          service_role=$(echo "$STATUS" | grep '^SERVICE_ROLE_KEY=' | cut -d'"' -f2)
          db_url=$(echo "$STATUS" | grep '^DB_URL='            | cut -d'"' -f2)
          # Treat keys as masked output. They are local-only test secrets,
          # but masking keeps them out of step logs if any tool echoes them.
          echo "::add-mask::$anon_key"
          echo "::add-mask::$service_role"
          {
            echo "api_url=$api_url"
            echo "anon_key=$anon_key"
            echo "service_role=$service_role"
            echo "db_url=$db_url"
          } >> "$GITHUB_OUTPUT"

      - name: Seed admin auth user
        env:
          API_URL: ${{ steps.supabase.outputs.api_url }}
          SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role }}
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}
        run: |
          # GoTrue admin endpoint. 200/201 = created, 422 = already exists
          # (idempotent re-run path). Anything else fails the job loudly.
          payload=$(printf '{"email":"%s","password":"%s","email_confirm":true}' \
            "$ADMIN_EMAIL" "$ADMIN_PASSWORD")
          code=$(curl -sS -o /tmp/seed_admin.json -w "%{http_code}" \
            -X POST "$API_URL/auth/v1/admin/users" \
            -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "apikey: $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")
          case "$code" in
            200|201) echo "admin auth user created" ;;
            422)     echo "admin auth user already exists (idempotent reuse)" ;;
            *)
              echo "::error::auth admin create returned HTTP $code"
              cat /tmp/seed_admin.json
              exit 1
              ;;
          esac

      - name: Promote admin via setup-local
        run: bash scripts/setup-local.sh

      - name: Verify admin is enabled
        env:
          DB_URL: ${{ steps.supabase.outputs.db_url }}
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
        run: |
          # setup-local.sh prints warnings rather than failing on bootstrap
          # misfires. Re-check the post-condition here so CI fails early and
          # clearly if the admin row isn't fully provisioned.
          result=$(psql "$DB_URL" -t -A -F '|' -v ON_ERROR_STOP=1 \
            -v admin_email="$ADMIN_EMAIL" <<'SQL' | tr -d '[:space:]'
            SELECT up.role, COALESCE(ua.is_enabled::text, 'false')
            FROM public.user_profiles up
            LEFT JOIN public.user_access ua ON ua.user_id = up.id
            WHERE up.email = :'admin_email';
          SQL
          )
          if [ "$result" != "admin|true" ]; then
            echo "::error::admin not provisioned: got '$result', want 'admin|true'"
            exit 1
          fi
          echo "admin verified: role=admin, is_enabled=true"

      - name: E2E
        env:
          VITE_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          VITE_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          PLAYWRIGHT_ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}
        run: pnpm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/output/playwright/
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: bash scripts/supabase.sh stop || true

  ios:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@ab5d408e9d066b8ffe7503f789d50fd7e35c0c92 # v6.0.7
        with:
          version: 11.0.9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate iOS project
        run: cd apps/ios && xcodegen generate

      - name: Run iOS tests
        run: cd apps/ios && xcodebuild -project FamilyEvents.xcodeproj -scheme FamilyEvents -destination 'platform=iOS Simulator,name=iPhone 15' test
