name: railway-cron-drift

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: railway-cron-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_VAR_railway_environment_id: 03e869e2-4e35-4849-84b7-6c0278c1c6fb
  TF_VAR_railway_project_access_token: ${{ secrets.RAILWAY_POC_PROJECT_ACCESS_TOKEN }}

jobs:
  drift-guard:
    name: drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node (for human-readable diagnostics)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Print Railway cron diagnostics (human readable)
        # This step always runs and produces clear "expected vs live" output.
        # It uses the robust JS parser (scripts/spacelift-railway-cron-poc.mjs).
        # We || true so a diagnostics failure does not short-circuit the job;
        # the Terraform step below is the actual gate (for Spacelift policy compatibility).
        run: |
          echo "=== Expected config from committed railway.toml files ==="
          node scripts/spacelift-railway-cron-poc.mjs validate || true
        env:
          # The script will fall back to fixture mode or just print expected if no Railway auth
          RAILWAY_POC_PROJECT_ACCESS_TOKEN: ${{ secrets.RAILWAY_POC_PROJECT_ACCESS_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      - name: Validate secret
        shell: bash
        run: |
          set -euo pipefail
          : "${TF_VAR_railway_project_access_token:?missing RAILWAY_POC_PROJECT_ACCESS_TOKEN secret}"

      - name: Terraform init
        run: terraform -chdir=infra/spacelift-railway-cron-poc init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/spacelift-railway-cron-poc validate

      - name: Enforce Railway cron drift guard (Terraform precondition)
        # This is the real gate. It will fail the job (and any Spacelift policy)
        # if the parsed repo config does not match live Railway state.
        run: terraform -chdir=infra/spacelift-railway-cron-poc plan -input=false -lock=false -detailed-exitcode || exit 1
