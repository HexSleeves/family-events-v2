name: android-release

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Android artifact type
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
  push:
    tags:
      - 'android-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      IS_DEBUG_BUILD: ${{ endsWith(github.ref_name, '-debug') || (github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          cache-cleanup: never

      - name: Decode Keystore
        if: env.IS_DEBUG_BUILD != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 secret is missing."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/android/app/release.keystore

      - name: Build Android Artifact
        env:
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          cd apps/android
          if [ "$IS_DEBUG_BUILD" = "true" ]; then
            ./gradlew :app:assembleDebug --stacktrace
          else
            ./gradlew :app:bundleRelease :app:assembleRelease --stacktrace
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: family-events-android-release
          path: |
            apps/android/app/build/outputs/bundle/release/*.aab
            apps/android/app/build/outputs/apk/release/*.apk
            apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
