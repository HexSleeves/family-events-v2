# Nixpacks pins Node 23 + pnpm so Railway builds match local dev.
# Without this, Nixpacks auto-selects Node LTS which can drift over time
# and break builds that depend on specific Node APIs (e.g. structuredClone
# behaviour, fetch streaming, TypeScript bundler options).

[variables]
NODE_VERSION = "23"

[phases.setup]
nixPkgs = ["nodejs_23", "pnpm"]
