on:
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
      branch: ${{ event.git.branch }}
  github:
    pull_request:
      init:
        commit-sha: ${{ event.git.sha }}
        pr-number: ${{ event.github.pull_request.number }}
        branch: ${{ event.git.branch }}
      status-checks:
        name: CI
    push:
      init:
        commit-sha: ${{ event.git.sha }}
        branch: ${{ event.git.branch }}
      status-checks:
        name: CI

# Cancel superseded runs automatically.
# All triggers define `branch` in their init so every condition is safe to evaluate.
# Pool keyed by branch name covers both PR pushes (head branch) and direct pushes.
concurrency-pools:
  - id: HexSleeves/family-events-v2:branch-${{ init.branch }}
    if: ${{ init.branch != 'main' }}
    capacity: 1
    on-overflow: cancel-running
  - id: HexSleeves/family-events-v2:main
    if: ${{ init.branch == 'main' }}
    capacity: 1
    on-overflow: queue

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.1

# Tool cache (disabled until vault is configured):
# 1. Go to RWX UI → Vaults → default → Tool Caches tab → enable it
#    (or create a new locked vault named `family-events-v2-main` restricted to main)
# 2. Uncomment the two blocks below:
#
# tool-cache:
#   vault: default
#
# Then add to pnpm-install task:
#   tool-cache: ci-pnpm-install

tasks:
  # ── shared ─────────────────────────────────────────────────────────────────

  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/HexSleeves/family-events-v2.git
      ref: ${{ init.commit-sha }}

  # ── web ────────────────────────────────────────────────────────────────────

  - key: node
    call: nodejs/install 1.1.14
    with:
      node-version: 24.11.0

  - key: captain
    call: rwx/install-captain 1.1.6

  - key: pnpm-install
    use: [code, node]
    run: |
      corepack enable
      pnpm install --frozen-lockfile
    filter:
      - pnpm-lock.yaml
      - package.json
      - pnpm-workspace.yaml
      - .npmrc
      - apps/web/package.json
      - packages/*/package.json
    timeout: 10m

  - key: web-typecheck
    use: pnpm-install
    run: pnpm --filter @family-events/web typecheck
    filter:
      - "apps/web/**/*.ts"
      - "apps/web/**/*.tsx"
      - "apps/web/tsconfig*.json"
      - "packages/**/*.ts"
      - "packages/**/tsconfig*.json"
    outputs:
      problems:
        - matcher: tsc

  - key: web-lint
    use: pnpm-install
    run: pnpm --filter @family-events/web lint
    filter:
      - "apps/web/src/**/*.ts"
      - "apps/web/src/**/*.tsx"
      - "apps/web/.oxlintrc.json"

  - key: web-format
    use: pnpm-install
    run: pnpm --filter @family-events/web format:check
    filter:
      - "apps/web/src/**"
      - "packages/config-quality/**"

  - key: web-test
    use: [pnpm-install, captain]
    run: captain run family-events-vitest
    outputs:
      test-results:
        - path: apps/web/tmp/vitest.json

  - key: web-build
    use: pnpm-install
    run: pnpm --filter @family-events/web build
    filter:
      - "apps/web/src/**"
      - "apps/web/index.html"
      - "apps/web/vite.config.ts"
      - "apps/web/tsconfig*.json"
      - "packages/**"
    timeout: 15m
    # Extra cores speed up Vite/Rollup bundling.
    agent:
      cpus: 4
      memory: 8gb
    outputs:
      artifacts:
        - key: dist
          path: apps/web/dist

  - key: packages-test
    use: pnpm-install
    run: pnpm packages:test
    filter:
      - "packages/**/*.ts"
      - "packages/*/package.json"
      - "packages/*/vitest.config.*"

  - key: workspace-test
    use: [code, pnpm-install]
    run: |
      pnpm workspace:test
      pnpm docs:test

  # ── ios ────────────────────────────────────────────────────────────────────
  # Only packages that compile on Linux (no Apple SDK) run here.
  # Full iOS simulator tests live in the macOS GitHub Actions job.

  - key: swift-install
    run: |
      sudo apt-get update -q
      sudo apt-get install -y --no-install-recommends \
        binutils git gnupg2 \
        libc6-dev libcurl4-openssl-dev libedit2 \
        libgcc-13-dev libncurses-dev libpython3-dev \
        libsqlite3-0 libstdc++-13-dev libxml2-dev libz3-dev \
        pkg-config tzdata unzip zlib1g-dev
      wget -q https://download.swift.org/swift-5.10.1-release/ubuntu2404/swift-5.10.1-RELEASE/swift-5.10.1-RELEASE-ubuntu24.04.tar.gz
      sudo tar -xzf swift-5.10.1-RELEASE-ubuntu24.04.tar.gz -C /opt
      /opt/swift-5.10.1-RELEASE-ubuntu24.04/usr/bin/swift --version
    cache:
      ttl: 7 days
    timeout: 20m
    agent:
      cpus: 4
      memory: 16gb

  - key: fecore-test
    use: [code, swift-install]
    run: |
      export PATH=/opt/swift-5.10.1-RELEASE-ubuntu24.04/usr/bin:$PATH
      cd apps/ios/Packages/FECore
      swift test --parallel
    filter:
      - "apps/ios/Packages/FECore/**"
    timeout: 20m
    agent:
      cpus: 4
      memory: 16gb
