on:
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
  github:
    pull_request:
      init:
        commit-sha: ${{ event.git.sha }}
      status-checks:
        name: CI
    push:
      init:
        commit-sha: ${{ event.git.sha }}
      status-checks:
        name: CI

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.1

# Tool caches require a vault named after the repo + branch in the RWX UI.
# Uncomment once the vault `family-events-v2-main` is created:
#
# tool-cache:
#   vault: family-events-v2-main

tasks:
  # ── shared ─────────────────────────────────────────────────────────────────

  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/HexSleeves/family-events-v2.git
      ref: ${{ init.commit-sha }}

  # ── web ────────────────────────────────────────────────────────────────────

  - key: node
    call: nodejs/install 1.1.14
    with:
      node-version: 24.11.0

  - key: captain
    call: rwx/install-captain 1.1.6

  - key: pnpm-install
    use: [code, node]
    run: |
      corepack enable
      pnpm install --frozen-lockfile
    filter:
      - pnpm-lock.yaml
      - package.json
      - pnpm-workspace.yaml
      - .npmrc
      - apps/web/package.json
      - packages/*/package.json
    timeout: 10m
    # tool-cache: ci-pnpm-install   # enable once vault is configured

  - key: web-typecheck
    use: pnpm-install
    run: pnpm --filter @family-events/web typecheck
    filter:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/tsconfig*.json"
    outputs:
      problems:
        - matcher: tsc

  - key: web-lint
    use: pnpm-install
    run: pnpm --filter @family-events/web lint
    filter:
      - "apps/web/src/**/*.ts"
      - "apps/web/src/**/*.tsx"
      - "apps/web/.oxlintrc.json"

  - key: web-format
    use: pnpm-install
    run: pnpm --filter @family-events/web format:check
    filter:
      - "apps/web/src/**"
      - "packages/config-quality/**"

  - key: web-test
    use: [pnpm-install, captain]
    run: captain run family-events-vitest
    outputs:
      test-results:
        - path: apps/web/tmp/vitest.json

  - key: web-build
    use: pnpm-install
    run: pnpm --filter @family-events/web build
    filter:
      - "apps/web/src/**"
      - "apps/web/index.html"
      - "apps/web/vite.config.ts"
      - "apps/web/tsconfig*.json"
      - "packages/**"
    timeout: 15m
    outputs:
      artifacts:
        - key: dist
          path: apps/web/dist

  - key: workspace-test
    use: pnpm-install
    run: |
      pnpm workspace:test
      pnpm docs:test

  # ── ios ────────────────────────────────────────────────────────────────────

  - key: swift-install
    run: |
      sudo apt-get update -q
      sudo apt-get install -y --no-install-recommends \
        binutils git gnupg2 \
        libc6-dev libcurl4-openssl-dev libedit2 \
        libgcc-13-dev libncurses-dev libpython3-dev \
        libsqlite3-0 libstdc++-13-dev libxml2-dev libz3-dev \
        pkg-config tzdata unzip zlib1g-dev
      wget -q https://download.swift.org/swift-5.10.1-release/ubuntu2404/swift-5.10.1-RELEASE/swift-5.10.1-RELEASE-ubuntu24.04.tar.gz
      sudo tar -xzf swift-5.10.1-RELEASE-ubuntu24.04.tar.gz -C /opt
      /opt/swift-5.10.1-RELEASE-ubuntu24.04/usr/bin/swift --version
    cache:
      ttl: 7 days
    timeout: 20m
    agent:
      cpus: 4
      memory: 16gb

  - key: fecore-test
    use: [code, swift-install]
    run: |
      export PATH=/opt/swift-5.10.1-RELEASE-ubuntu24.04/usr/bin:$PATH
      cd apps/ios/Packages/FECore
      swift test --parallel
    filter:
      - "apps/ios/Packages/FECore/**"
    timeout: 20m
    agent:
      cpus: 4
      memory: 16gb
