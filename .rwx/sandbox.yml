on:
  cli:
    init:
      commit-sha: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.0

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      preserve-git-dir: true
      repository: https://github.com/HexSleeves/family-events-v2.git
      ref: ${{ init.commit-sha }}

  # Any other dependencies should be defined here and then `use`d by the sandbox task
  - key: sandbox
    use: code
    run: rwx-sandbox
