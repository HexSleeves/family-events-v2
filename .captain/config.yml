test-suites:
  family-events-vitest:
    command: pnpm --filter @family-events/web exec vitest run --reporter=default --reporter=json --outputFile=./tmp/vitest.json
    results:
      path: apps/web/tmp/vitest.json
    output:
      print-summary: true
    retries:
      attempts: 2
      command: pnpm --filter @family-events/web exec vitest '{{ file }}' --testNamePattern '{{ testNamePattern }}' --reporter=default --reporter=json --outputFile=./tmp/vitest.json
