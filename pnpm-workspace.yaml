packages:
  - "apps/*"
  - "packages/*"
  - "supabase/functions"

allowBuilds:
  '@sentry/cli': true
  esbuild: true
  supabase: false

onlyBuiltDependencies:
  - esbuild

minimumReleaseAgeExclude:
  - '@vitest/*'
  - vitest
  - framer-motion@12.40.0
  - motion-dom@12.40.0
  - motion@12.40.0
  - vite@8.0.14
  - '@tanstack/react-virtual@3.13.26'
  - '@tanstack/virtual-core@3.16.0'
