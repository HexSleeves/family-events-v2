[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
cronSchedule = "0 * * * *"
# ALWAYS (not NEVER): Railway's cron scheduler only re-fires a one-shot
# container if the restart policy allows it. With NEVER the container stays
# exited and the next scheduled run never spawns. Verified empirically on
# this project.
restartPolicyType = "ALWAYS"
