[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPaths = ["apps/cron-scrape-sources/**"]

[deploy]
# Hourly. run_due_source_scrapes checks event_sources for due rows using
# last_scraped_at + scrape_interval_hours. The finest scrape_interval used
# in production is 1h, so hourly polling hits every due window with up to
# 1h jitter. Toggle the whole job from the admin UI (private.cron_enabled)
# without redeploying.
cronSchedule = "0 * * * *"
# ON_FAILURE: ALWAYS caused a tight restart loop (curl exits → instant
# restart → curl exits → ...) and bypassed the cron schedule entirely. With
# ON_FAILURE Railway only restarts on a non-zero exit, so a clean run waits
# for the next cron tick.
restartPolicyType = "ON_FAILURE"
