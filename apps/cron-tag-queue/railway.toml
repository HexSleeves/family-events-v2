[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPaths = ["apps/cron-tag-queue/**"]

[deploy]
# Every 5 minutes — Railway's hard minimum interval (any cronSchedule below
# 5min is silently ignored by the scheduler, even though serviceInstance
# stores it). Faster cadence comes from process-tag-queue's self-chain at
# the end of each batch: when pending_after > 0, it fires a fresh
# invoke_process_tag_queue RPC, kicking the next batch via net.http_post.
# Cron */5 is the safety net + recovery from chain failures.
cronSchedule = "*/5 * * * *"
# ON_FAILURE: ALWAYS caused a tight restart loop (curl exits → instant
# restart → curl exits → ...) and bypassed the cron schedule entirely. With
# ON_FAILURE Railway only restarts on a non-zero exit, so a clean run waits
# for the next cron tick.
restartPolicyType = "ON_FAILURE"
