[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPaths = ["apps/cron-send-reminders/**"]

[deploy]
# Daily at 6:00 AM Central (11:00 UTC). Sends day-before and morning-of
# reminders for saved events. Toggle from admin UI (private.cron_enabled).
cronSchedule = "0 11 * * *"
restartPolicyType = "ON_FAILURE"
