name: FamilyEvents
options:
  minimumXcodeGenVersion: 2.38.0
  xcodeVersion: "15.4"
  projectFormat: xcode15_3
settings:
  base:
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: "1.0"
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.familyevents.app
  configs:
    Debug:
      SUPABASE_URL: http://127.0.0.1:55321
      SUPABASE_ANON_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
      APP_WEB_URL: http://localhost:5173
    Release:
      SUPABASE_URL: https://ufrjcnozcapskjtoakvf.supabase.co
      SUPABASE_ANON_KEY: sb_publishable_5SvbRT9MxYeLxn9lBAkSdA_xGVy430_
      APP_WEB_URL: https://family-events.app
packages:
  FECore:
    path: Packages/FECore
  FEData:
    path: Packages/FEData
  FEDesignSystem:
    path: Packages/FEDesignSystem
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.18.0
  FEAuth:
    path: Packages/FEAuth
  FEPlan:
    path: Packages/FEPlan
  FEExplore:
    path: Packages/FEExplore
  FESaved:
    path: Packages/FESaved
  FEEventDetail:
    path: Packages/FEEventDetail
  FEAppIntents:
    path: Packages/FEAppIntents
targets:
  FamilyEvents:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FamilyEvents
    info:
      path: FamilyEvents/Info.plist
      properties:
        UILaunchScreen: {}
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
        AppWebURL: $(APP_WEB_URL)
        NSLocationWhenInUseUsageDescription: "We use your location to surface family events near you."
        NSCalendarsWriteOnlyAccessUsageDescription: "We add events you save to your calendar so you don't miss them."
    settings:
      base:
        PRODUCT_NAME: FamilyEvents
        CODE_SIGN_ENTITLEMENTS: FamilyEvents/App/FamilyEvents.entitlements
    dependencies:
      - package: FECore
      - package: FEData
      - package: FEDesignSystem
      - package: FEAuth
      - package: FEPlan
      - package: FEExplore
      - package: FESaved
      - package: FEEventDetail
      - package: FEAppIntents
    scheme:
      testTargets:
        - FamilyEventsTests
        - FEDesignSystemTests
  FamilyEventsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FamilyEventsTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FamilyEvents
      - package: FECore
      - package: FEData
      - package: FEData
        product: FEDataTesting
      - package: FEAuth
      - package: FEAuth
        product: FEAuthTesting
      - package: FEPlan
  FEDesignSystemTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Packages/FEDesignSystem/Tests/FEDesignSystemTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: FEDesignSystem
      - package: swift-snapshot-testing
        product: SnapshotTesting
    scheme:
      testTargets:
        - FEDesignSystemTests
