name: FamilyEvents
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.familyevents.app
  configs:
    Debug:
      SUPABASE_URL: http://127.0.0.1:55321
      SUPABASE_ANON_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
    Release:
      SUPABASE_URL: ""
      SUPABASE_ANON_KEY: ""
packages:
  FECore:
    path: Packages/FECore
  FEData:
    path: Packages/FEData
  FEDesignSystem:
    path: Packages/FEDesignSystem
  FEAuth:
    path: Packages/FEAuth
  FEPlan:
    path: Packages/FEPlan
  FEExplore:
    path: Packages/FEExplore
  FESaved:
    path: Packages/FESaved
  FEEventDetail:
    path: Packages/FEEventDetail
  FEAppIntents:
    path: Packages/FEAppIntents
targets:
  FamilyEvents:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FamilyEvents
    info:
      path: FamilyEvents/Info.plist
      properties:
        UILaunchScreen: {}
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
        NSLocationWhenInUseUsageDescription: "We use your location to surface family events near you."
    settings:
      base:
        PRODUCT_NAME: FamilyEvents
        CODE_SIGN_ENTITLEMENTS: FamilyEvents/App/FamilyEvents.entitlements
    dependencies:
      - package: FECore
      - package: FEData
      - package: FEDesignSystem
      - package: FEAuth
      - package: FEPlan
      - package: FEExplore
      - package: FESaved
      - package: FEEventDetail
      - package: FEAppIntents
    scheme:
      testTargets:
        - FamilyEventsTests
  FamilyEventsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FamilyEventsTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FamilyEvents
      - package: FECore
      - package: FEData
      - package: FEData
        product: FEDataTesting
      - package: FEAuth
      - package: FEAuth
        product: FEAuthTesting
      - package: FEPlan
