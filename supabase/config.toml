project_id = "family-events-ui"

[api]
enabled           = true
port              = 55321
schemas           = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows          = 1000

[db]
port          = 55322
major_version = 17

[db.migrations]
enabled      = true
schema_paths = ["./migrations/*.sql"]

[db.seed]
enabled = true
sql_paths = [
  "./seed.sql",
]

[realtime]
enabled = true

[auth]
enabled       = true
site_url      = "http://localhost:5173"
jwt_expiry    = 3600
enable_signup = true
minimum_password_length = 8
# Keep this list in sync with Supabase Dashboard → Authentication → URL
# Configuration → Redirect URLs. The dashboard list governs the hosted
# project; this list governs `supabase start` only. Both must include any
# path the client passes as `redirectTo` (e.g. /reset-password) or auth
# silently falls back to site_url.
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5173/**",
  "https://family-events.up.railway.app",
  "https://family-events.up.railway.app/**",
]

[auth.external.apple]
enabled = true
# Services ID is public; hardcode to prevent `supabase config push` from
# clobbering prod when SUPABASE_AUTH_EXTERNAL_APPLE_CLIENT_ID is unset locally.
client_id = "com.familyevents.app"
secret    = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"
# Apple "secret" is the signed JWT computed from team ID + key ID + .p8.
# Never run `supabase config push` without setting the secret env var first,
# or prod Apple auth will break.
url              = ""
redirect_uri     = ""
skip_nonce_check = false

[auth.external.google]
enabled          = true
client_id        = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret           = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
url              = ""
redirect_uri     = ""
skip_nonce_check = false

[storage]
enabled         = true
file_size_limit = "50MiB"

[studio]
enabled = true
port    = 55323

[inbucket]
enabled = true
port    = 55324

[analytics]
enabled = true
port    = 55327

[edge_runtime]
enabled        = true
policy         = "oneshot"
inspector_port = 55326

[functions.scrape-source]
# Called by run_due_source_scrapes / pg_net with the vault service role
# secret (sb_secret_*). Gateway JWT check would reject that bearer; app-layer
# requireAdminOrService still gates real admin access.
verify_jwt = false

[functions.tag-event]
# Called by process-tag-queue worker with sb_secret_* bearer. App-layer
# requireServiceRole still enforces auth.
verify_jwt = false

[functions.share-og]
verify_jwt = true

[functions.notify-email]
# Triggered by dispatch_email_notification / pg_net with sb_secret_* bearer.
# App-layer requireServiceRole still enforces auth.
verify_jwt = false

[functions.process-tag-queue]
verify_jwt = false

[functions.process-source-queue]
verify_jwt = false

[functions.process-event-review-queue]
verify_jwt = false

[functions.backfill-event-enrichment]
# Called by cron-enrich-events with sb_secret_* bearer. App-layer
# requireServiceRole still enforces auth.
verify_jwt = false

[functions.cleanup-stale-runs]
# Called by cron-cleanup-stale with sb_secret_* bearer. App-layer
# requireServiceRole still enforces auth.
verify_jwt = false

[functions.log-cron-run]
# Called by all cron-runner.sh scripts with sb_secret_* bearer. App-layer
# requireServiceRole still enforces auth.
verify_jwt = false

[functions.scrape-due-sources]
verify_jwt = false

[functions.db-maintenance]
verify_jwt = false

[functions.send-auth-email]
# Called by Supabase Auth as the send_email hook. Not a user JWT — hook
# requests carry a Supabase-signed payload, not a bearer JWT.
verify_jwt = false

[auth.hook.send_email]
# Routes all Supabase Auth emails (magic link, signup confirmation, recovery,
# email change) through the send-auth-email edge function → Resend templates.
#
# Configure the hook in the Supabase Dashboard instead:
#   Authentication → Hooks → Send Email
#   URI:     https://<ref>.supabase.co/functions/v1/send-auth-email
#   Secret:  <generate with: v1,whsec_$(openssl rand -base64 32)>
#
# For local dev, configure it in Supabase Studio (port 55323) or leave it
# unset — auth emails will fall through to Inbucket (port 55324).
enabled = true
uri     = "https://ufrjcnozcapskjtoakvf.supabase.co/functions/v1/send-auth-email"
# Must be a literal v1,whsec_<base64> value so Supabase CLI validation
# passes in CI/preview environments where local .env files are unavailable.
# Replace this with your project's generated hook secret when managing hook
# config from source control.
secrets = "v1,whsec_YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXowMTIzNDU2Nzg5QUI="
