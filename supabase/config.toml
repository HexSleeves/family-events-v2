project_id = "family-events-ui"

[api]
enabled           = true
port              = 55321
schemas           = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows          = 1000

[db]
port          = 55322
major_version = 17

[db.migrations]
enabled      = true
schema_paths = ["./migrations/*.sql"]

[db.seed]
enabled = true
sql_paths = [
  "./seed.sql",
]

[realtime]
enabled = true

[auth]
enabled       = true
site_url      = "https://family-events.org"
jwt_expiry    = 3600
enable_signup = true
minimum_password_length = 6
# Keep this list in sync with Supabase Dashboard → Authentication → URL
# Configuration → Redirect URLs. The dashboard list governs the hosted
# project; this list governs `supabase start` only. Both must include any
# path the client passes as `redirectTo` (e.g. /reset-password) or auth
# silently falls back to site_url.
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5173/**",
  "https://family-events.up.railway.app",
  "https://family-events.up.railway.app/**",
  "https://family-events.org/**",
]

[auth.external.apple]
enabled = true
# Services ID is public. The secret is the hosted project's existing hash so
# config pushes do not overwrite Apple OAuth when the raw .p8/JWT is absent.
client_id = "app.familyevents.web"
secret    = "hash:fd39ad53627a44755fbcb4c820aa717bcfeaa1768db820d155fd5ccbf6206687"
url              = ""
redirect_uri     = ""
skip_nonce_check = false

[auth.external.google]
enabled          = true
client_id        = "545014101545-6sdgf63hp1q1vucmio3p98qo84mojnk1.apps.googleusercontent.com,545014101545-in1qudtusha5kqlf5cben5oljjhmha6o.apps.googleusercontent.com,545014101545-nbm89gkb02g645n19ftk4pkan4kro0pl.apps.googleusercontent.com"
secret           = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
url              = ""
redirect_uri     = ""
skip_nonce_check = true

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled         = true
file_size_limit = "50MiB"

[studio]
enabled = true
port    = 55323

[inbucket]
enabled = true
port    = 55324

[analytics]
enabled = true
port    = 55327

[edge_runtime]
enabled        = true
policy         = "oneshot"
inspector_port = 55326

[functions.scrape-source]
# Called by run_due_source_scrapes / pg_net with the vault service role
# secret (sb_secret_*). Gateway JWT check would reject that bearer; app-layer
# requireAdminOrService still gates real admin access.
verify_jwt = false

[functions.tag-event]
# Called by process-tag-queue worker with sb_secret_* bearer. App-layer
# requireServiceRole still enforces auth.
verify_jwt = false

[functions.share-og]
# Public on purpose: social crawlers (Facebookbot, Twitterbot, LinkedInBot,
# Slackbot, Discordbot, iMessage link unfurl) never carry a user JWT, so a
# gateway-level JWT check returns 401 before the function body runs and breaks
# every shared-event preview in chat apps. The function body is the security
# boundary instead: extractEventIdFromRequest rejects anything that isn't a
# UUID before it touches the DB, only GET/OPTIONS are accepted (see
# corsHeaders in index.ts), and the query reads only the public_events view
# with the anon key — RLS on that view is the real gate.
verify_jwt = false

[functions.notify-email]
# Triggered by dispatch_email_notification / pg_net with sb_secret_* bearer.
# App-layer requireServiceRole still enforces auth.
verify_jwt = false

[functions.process-tag-queue]
verify_jwt = false

[functions.process-source-queue]
verify_jwt = false

[functions.process-event-review-queue]
verify_jwt = false

[functions.backfill-event-enrichment]
# Called by cron-enrich-events with sb_secret_* bearer. App-layer
# requireServiceRole still enforces auth.
verify_jwt = false

[functions.generate-parent-tips]
# Called by backfill-event-enrichment per-event after tagging.
# Service-role only; app-layer requireServiceRole enforces auth.
verify_jwt = false

[functions.cleanup-stale-runs]
# Called by cron-cleanup-stale with sb_secret_* bearer. App-layer
# requireServiceRole still enforces auth.
verify_jwt = false

[functions.log-cron-run]
# Called by all cron-runner.sh scripts with sb_secret_* bearer. App-layer
# requireServiceRole still enforces auth.
verify_jwt = false

[functions.admin-run-cron]
# Called from the admin UI with a user JWT. App-layer requireAdminOrService
# mirrors private.is_admin and invokes the cron target with service role.
verify_jwt = true

[functions.scrape-due-sources]
verify_jwt = false

[functions.db-maintenance]
verify_jwt = false

[functions.send-auth-email]
# Called by Supabase Auth as the send_email hook. Not a user JWT — hook
# requests carry a Supabase-signed payload, not a bearer JWT.
verify_jwt = false

[functions.weather]
# Server-side OpenWeather proxy (keeps OPENWEATHER_API_KEY out of the client
# bundle). Requires a JWT so it isn't an open proxy; supabase-js sends the
# anon/authenticated token on invoke.
verify_jwt = true

[auth.hook.send_email]
# Routes all Supabase Auth emails (magic link, signup confirmation, recovery,
# email change) through the send-auth-email edge function → Resend templates.
#
# Configure the hook in the Supabase Dashboard instead:
#   Authentication → Hooks → Send Email
#   URI:     https://<ref>.supabase.co/functions/v1/send-auth-email
#   Secret:  <generate with: v1,whsec_$(openssl rand -base64 32)>
#
# For local dev, configure it in Supabase Studio (port 55323) or leave it
# unset — auth emails will fall through to Inbucket (port 55324).
enabled = false
uri     = "https://ufrjcnozcapskjtoakvf.supabase.co/functions/v1/send-auth-email"
# The raw hook secret comes from root .env for config pushes; the remote config
# stores only its hash.
secrets = "env(SEND_EMAIL_HOOK_SECRET)"
